<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>GitHub OAuth Profile</title>

    <style>
        body {
            font-family: Arial;
            background: #0d1117;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 400px;
            padding: 20px;
            border-radius: 10px;
            background: #161b22;
            border: 1px solid #30363d;
            text-align: center;
        }

        button {
            padding: 10px 16px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #2ea043;
        }

        pre {
            text-align: left;
            background: #0d1117;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
        }

        img {
            width: 80px;
            border-radius: 50%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>GitHub OAuth Login</h2>

    <button onclick="login()">Login with GitHub</button>

    <p id="status"></p>

    <img id="avatar" style="display:none;" />

    <pre id="userData"></pre>
</div>

<script>
const API = "http://localhost:9001/api/v1/auth";

// STEP 1: Login
function login() {
    window.location.href = `${API}/github`;
}

// STEP 2: Fetch user from backend
async function getUser(token) {
    try {
        const res = await fetch(`${API}/me`, {
            headers: {
                Authorization: `Bearer ${token}`
            }
        });

        const data = await res.json();

        if (data.success) {
            const user = data.data;

            document.getElementById("status").innerText =
                "Welcome " + user.name;

            document.getElementById("userData").innerText =
                JSON.stringify(user, null, 2);

            if (user.avatar?.url) {
                const img = document.getElementById("avatar");
                img.src = user.avatar.url;
                img.style.display = "block";
            }
        } else {
            document.getElementById("status").innerText =
                "Failed to load user";
        }

    } catch (err) {
        console.log(err);
    }
}

// STEP 3: Handle callback + stored login
window.onload = function () {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("accessToken");

    if (token) {
        localStorage.setItem("token", token);
        window.history.replaceState({}, document.title, "/");
        getUser(token);
    } else {
        const saved = localStorage.getItem("token");

        if (saved) {
            getUser(saved);
        }
    }
};
</script>

</body>
</html>
