<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google OAuth Test</title>

    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        pre {
            background: #f4f4f4;
            padding: 15px;
            overflow: auto;
            border-radius: 8px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>Google Login Test</h1>

    <div
        id="g_id_onload"
        data-client_id="189267551336-5oo82iqoq18v5khigfi60ngei4lintnm.apps.googleusercontent.com"
        data-callback="handleCredentialResponse">
    </div>

    <div
        class="g_id_signin"
        data-type="standard"
        data-size="large"
        data-theme="outline">
    </div>

    <h2>Google Response</h2>
    <pre id="googleData">Waiting for login...</pre>

    <h2>Backend Response</h2>
    <pre id="backendData">Waiting for login...</pre>

    <script>
        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');

            return JSON.parse(
                decodeURIComponent(
                    atob(base64)
                        .split('')
                        .map(c =>
                            '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
                        )
                        .join('')
                )
            );
        }

        async function handleCredentialResponse(response) {

            console.log("Full Google Response:", response);

            const decoded = parseJwt(response.credential);

            document.getElementById("googleData").textContent =
                JSON.stringify(decoded, null, 2);

            try {
                const res = await fetch(
                    "http://localhost:9001/api/v1/auth/google",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        credentials: "include",
                        body: JSON.stringify({
                            credential: response.credential
                        })
                    }
                );

                const data = await res.json();

                document.getElementById("backendData").textContent =
                    JSON.stringify(data, null, 2);

                console.log("Backend Response:", data);

            } catch (error) {
                console.error(error);

                document.getElementById("backendData").textContent =
                    error.message;
            }
        }
    </script>
</body>
</html>
